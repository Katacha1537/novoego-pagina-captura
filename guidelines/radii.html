<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      margin: 0;
      background: var(--ink-900);
      font-family: var(--font-sans);
      padding: 24px;
      display: flex;
      gap: 18px;
      align-items: flex-end;
    }

    .col {
      text-align: center;
    }

    .box {
      width: 80px;
      height: 64px;
      background: var(--ink-700);
      border: 1px solid var(--border-accent);
      box-shadow: var(--bevel-top);
    }

    .l {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .pill {
      width: 120px;
      border-radius: var(--radius-pill);
    }
  </style>
</head>

<body>
  <div class="col">
    <div class="box" style="border-radius:var(--radius-sm)"></div>
    <div class="l">sm · 8</div>
  </div>
  <div class="col">
    <div class="box" style="border-radius:var(--radius-md)"></div>
    <div class="l">md · 12</div>
  </div>
  <div class="col">
    <div class="box" style="border-radius:var(--radius-lg)"></div>
    <div class="l">lg · 18</div>
  </div>
  <div class="col">
    <div class="box" style="border-radius:var(--radius-xl)"></div>
    <div class="l">xl · 28</div>
  </div>
  <div class="col">
    <div class="box pill"></div>
    <div class="l">pill · 999</div>
  </div>
</body>

</html>
