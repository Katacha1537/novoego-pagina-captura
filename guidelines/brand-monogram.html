<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      margin: 0;
      background: var(--ink-950);
      font-family: var(--font-sans);
      padding: 24px;
      display: flex;
      gap: 36px;
      align-items: center;
      justify-content: center;
    }

    img {
      display: block;

    .alt {

      height: 84px;
      border-radius: 50%;
      background: var(--ink-800);
      border: 1px solid var(--border-accent);
    }
  </style>
</head>

<body>
  <img src="../assets/monogram.svg" width="120" height="120" alt="Monograma Novo Ego">
  <img src="../assets/monogram.svg" width="64" height="64" alt="Monograma pequeno">
  <img src="../assets/monogram.svg" width="40" height="40" alt="Monograma mínimo">

</html>
