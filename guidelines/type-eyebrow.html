<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      margin: 0;
      background: var(--ink-900);
      font-family: var(--font-sans);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .caption {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .04em;
      color: var(--text-dim);
    }

    .orn {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="eyebrow">A Nova Ciência da Mente</div>
  <div class="orn">— &nbsp; Formação &nbsp; —</div>
  <div class="caption">CRM/SP 144721 · Membro da Sociedade Brasileira</div>
</body>

</html>
