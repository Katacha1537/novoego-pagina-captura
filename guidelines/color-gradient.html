<!-- @dsCard group="Colors" viewport="700x170" name="Metallic Sweep & Glow" subtitle="The signature gilt gradient + restrained gold glow" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:24px;display:flex;gap:16px;align-items:stretch;}
  .tile{flex:1;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;min-height:96px;}
  .grad{background:var(--gradient-gold);color:#3a2c12;font-weight:700;letter-spacing:.16em;font-size:12px;text-transform:uppercase;}
  .glow{background:var(--gradient-gold);box-shadow:var(--glow-gold);color:#3a2c12;font-weight:700;letter-spacing:.16em;font-size:12px;text-transform:uppercase;}
  .text{background:var(--ink-800);border:1px solid var(--border);}
  .gilt{font-family:var(--font-statement);font-size:34px;font-weight:600;background:var(--gradient-gold-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
</style></head>
<body>
  <div class="tile grad">gradient-gold</div>
  <div class="tile glow">+ glow-gold</div>
  <div class="tile text"><span class="gilt">Gilt&nbsp;Aa</span></div>
</body></html>
