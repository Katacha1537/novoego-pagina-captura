<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:24px;display:flex;gap:16px;}
  .ph{flex:1;height:140px;border-radius:var(--radius-lg);border:1px solid var(--border);position:relative;overflow:hidden;
    background:
      repeating-linear-gradient(135deg, rgba(244,239,231,.05) 0 2px, transparent 2px 11px),
      linear-gradient(160deg,#2a2420,#16120f);
    box-shadow:var(--bevel-top);}
  .tag{position:absolute;left:12px;bottom:12px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.04em;}
  .grad{position:absolute;inset:0;background:linear-gradient(to top, rgba(10,9,8,.85), transparent 55%);}
</style></head>
<body>
  <div class="ph"><div class="grad"></div><span class="tag">foto P&amp;B · retrato · gradiente de proteção</span></div>
  <div class="ph"><div class="grad"></div><span class="tag">foto P&amp;B · ambiente · grão sutil</span></div>
</body></html>
