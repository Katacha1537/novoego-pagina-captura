<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:24px;}
  .row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border-soft);padding:7px 0;}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);width:120px;flex:none;}
  .s{font-family:var(--font-statement);color:var(--text);line-height:1;}
</style></head>
<body>
  <div class="row"><span class="tok">display · 88px</span><span class="s" style="font-size:44px;text-transform:uppercase">Novo Ego</span></div>
  <div class="row"><span class="tok">h1 · 60px</span><span class="s" style="font-size:34px;font-family:var(--font-editorial)">Conheça a formação</span></div>
  <div class="row"><span class="tok">h2 · 44px</span><span class="s" style="font-size:26px;font-family:var(--font-editorial)">O que você vai receber</span></div>
  <div class="row"><span class="tok">lead · 20px</span><span class="s" style="font-size:18px;font-family:var(--font-sans);color:var(--text-muted)">Da base teórica à prática real.</span></div>
  <div class="row" style="border:none"><span class="tok">body · 17px</span><span class="s" style="font-size:15px;font-family:var(--font-sans);color:var(--text-soft)">Formamos analistas preparados.</span></div>
</body></html>
