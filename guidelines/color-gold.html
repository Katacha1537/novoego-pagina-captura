<!-- @dsCard group="Colors" viewport="700x180" name="Champagne Gold" subtitle="The single chromatic accent — value, authority, light" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:24px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{border-radius:var(--radius-md);height:84px;border:1px solid var(--border);box-shadow:var(--bevel-top);}
  .lab{margin-top:8px;font-size:11px;letter-spacing:.04em;color:var(--text-muted);}
  .hex{display:block;color:var(--text-dim);font-family:var(--font-mono);font-size:10px;margin-top:2px;}
  .core{outline:2px solid var(--gold-300);outline-offset:2px;}
</style></head>
<body>
  <div class="row">
    <div><div class="sw" style="background:var(--gold-100)"></div><div class="lab">gold-100<span class="hex">#F1DEB7</span></div></div>
    <div><div class="sw" style="background:var(--gold-300)"></div><div class="lab">gold-300<span class="hex">#E2C385</span></div></div>
    <div><div class="sw core" style="background:var(--gold-500)"></div><div class="lab">gold-500 · core<span class="hex">#C9A86A</span></div></div>
    <div><div class="sw" style="background:var(--gold-700)"></div><div class="lab">gold-700<span class="hex">#A8854B</span></div></div>
    <div><div class="sw" style="background:var(--gold-900)"></div><div class="lab">gold-900<span class="hex">#6E5630</span></div></div>
  </div>
</body></html>
