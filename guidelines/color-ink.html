<!-- @dsCard group="Colors" viewport="700x180" name="Warm Ink Scale" subtitle="Near-black neutrals, faint warm hue — never cold gray" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:24px;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .sw{border-radius:var(--radius-md);height:84px;border:1px solid var(--border);box-shadow:var(--bevel-top);}
  .lab{margin-top:8px;font-size:11px;letter-spacing:.04em;color:var(--text-muted);}
  .hex{display:block;color:var(--text-dim);font-family:var(--font-mono);font-size:10px;margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div><div class="sw" style="background:var(--ink-950)"></div><div class="lab">ink-950<span class="hex">#0A0908</span></div></div>
    <div><div class="sw" style="background:var(--ink-900)"></div><div class="lab">ink-900<span class="hex">#100E0C</span></div></div>
    <div><div class="sw" style="background:var(--ink-850)"></div><div class="lab">ink-850<span class="hex">#16120F</span></div></div>
    <div><div class="sw" style="background:var(--ink-800)"></div><div class="lab">ink-800<span class="hex">#1C1714</span></div></div>
    <div><div class="sw" style="background:var(--ink-700)"></div><div class="lab">ink-700<span class="hex">#261F1A</span></div></div>
    <div><div class="sw" style="background:var(--ink-600)"></div><div class="lab">ink-600<span class="hex">#322A23</span></div></div>
  </div>
</body></html>
