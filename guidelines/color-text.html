<!-- @dsCard group="Colors" viewport="700x150" name="Text on Dark" subtitle="Warm off-white scale — primary, soft, muted, dim" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:24px;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .line{display:flex;align-items:baseline;gap:14px;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);width:120px;}
  .ex{font-size:17px;}
</style></head>
<body>
  <div class="stack">
    <div class="line"><span class="tok">--text</span><span class="ex" style="color:var(--text)">A nova ciência da mente</span></div>
    <div class="line"><span class="tok">--text-soft</span><span class="ex" style="color:var(--text-soft)">A nova ciência da mente</span></div>
    <div class="line"><span class="tok">--text-muted</span><span class="ex" style="color:var(--text-muted)">A nova ciência da mente</span></div>
    <div class="line"><span class="tok">--text-dim</span><span class="ex" style="color:var(--text-dim)">A nova ciência da mente</span></div>
    <div class="line"><span class="tok">--accent</span><span class="ex" style="color:var(--accent)">A nova ciência da mente</span></div>
  </div>
</body></html>
