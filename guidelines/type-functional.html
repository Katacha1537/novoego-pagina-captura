<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-900);font-family:var(--font-sans);padding:28px 24px;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-bottom:14px;}
  .lead{font-size:20px;line-height:1.6;color:var(--text-muted);margin:0 0 12px;max-width:600px;}
  .body{font-size:15px;line-height:1.65;color:var(--text-soft);margin:0;max-width:600px;}
  b{color:var(--text);font-weight:700;}
</style></head>
<body>
  <div class="meta">font-sans · 400 body / 700 emphasis</div>
  <p class="lead">Da base teórica à prática real. Sem improviso, sem superficialidade.</p>
  <p class="body">Formamos analistas preparados para atuar com <b>segurança, autoridade e resultado</b>.</p>
</body></html>
