<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>

  .col{text-align:center;}
  .bar{background:var(--gradient-gold);border-radius:4px;width:30px;}
  .l{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:8px;}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:8px"></div><div class="l">2 · 8</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="l">4 · 16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="l">5 · 24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="l">6 · 32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="l">7 · 48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="l">8 · 64</div></div>
  <div class="col"><div class="bar" style="height:80px"></div><div class="l">9 · 96</div></div>
</body></html>
