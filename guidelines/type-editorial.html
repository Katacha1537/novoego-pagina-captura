<!-- @dsCard group="Type" viewport="700x200" name="Editorial, Cormorant Garamond" subtitle="Soft serif · sentence case headings + italic emphasis" -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      margin: 0;
      background: var(--ink-900);
      font-family: var(--font-sans);
      padding: 28px 24px;
    }

    .meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    h2 {
      font-family: var(--font-editorial);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -.01em;
      margin: 0;
      font-size: 38px;
      color: var(--text);
    }

    h2 em {
      font-style: italic;
      color: var(--accent-bright);
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="meta">font-editorial · 600 · sentence case · italic = accent</div>
  <h2>O descanso que sua mente <em>nunca teve</em>, mas sempre pediu.</h2>
</body>

</html>
